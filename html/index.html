<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobil Adatopó - MDT</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div id="root"></div>

    <div class="mdt-container" id="mdt-container" style="display: none;">
        <!-- MDT Header -->
        <div class="mdt-header">
            <h1><i class="fas fa-laptop"></i> Mobil Adatopó</h1>
            <button id="close-mdt" class="close-btn"><i class="fas fa-times"></i></button>
        </div>

        <!-- MDT Tabs -->
        <div class="mdt-tabs">
            <button class="tab-btn active" data-tab="dispatch">
                <i class="fas fa-radio"></i> Hívások
            </button>
            <button class="tab-btn" data-tab="vehicle">
                <i class="fas fa-car"></i> Jármű
            </button>
            <button class="tab-btn" data-tab="player">
                <i class="fas fa-user"></i> Játékos
            </button>
            <button class="tab-btn" data-tab="wanted">
                <i class="fas fa-user-slash"></i> Körözöttek
            </button>
            <button class="tab-btn" data-tab="notes">
                <i class="fas fa-sticky-note"></i> Megjegyzések
            </button>
        </div>

        <!-- MDT Content -->
        <div class="mdt-content">

            <!-- Dispatch Calls Tab -->
            <div class="tab-content active" id="dispatch-tab">
                <div class="tab-header">
                    <h2>Aktív Hívások</h2>
                    <button id="refresh-calls" class="refresh-btn"><i class="fas fa-sync"></i></button>
                </div>
                <div id="dispatch-list" class="call-list">
                    <p class="placeholder">Nincsenek aktív hívások...</p>
                </div>
            </div>

            <!-- Vehicle Search Tab -->
            <div class="tab-content" id="vehicle-tab">
                <div class="search-box">
                    <input type="text" id="vehicle-plate" placeholder="Jármű rendszám..." maxlength="8">
                    <button id="search-vehicle" class="search-btn"><i class="fas fa-search"></i></button>
                </div>
                <div id="vehicle-info" class="info-box">
                    <p class="placeholder">Írj be egy rendszámot a kereséshez...</p>
                </div>
            </div>

            <!-- Player Search Tab -->
            <div class="tab-content" id="player-tab">
                <div class="search-box">
                    <input type="text" id="player-search" placeholder="Játékos neve vagy ID-ja...">
                    <button id="search-player" class="search-btn"><i class="fas fa-search"></i></button>
                </div>
                <div id="player-results" class="results-list">
                    <p class="placeholder">Írj be egy nevet a kereséshez...</p>
                </div>
            </div>

            <!-- Wanted Tab -->
            <div class="tab-content" id="wanted-tab">
                <div class="search-box">
                    <input type="text" id="wanted-search" placeholder="Keresés körözöttek között...">
                    <button id="search-wanted" class="search-btn"><i class="fas fa-search"></i></button>
                </div>
                <div id="wanted-list" class="wanted-list">
                    <p class="placeholder">Nincsenek körözöttek...</p>
                </div>
            </div>

            <!-- Notes Tab -->
            <div class="tab-content" id="notes-tab">
                <div class="notes-section">
                    <textarea id="notes-input" placeholder="Írj be egy megjegyzést..."></textarea>
                    <button id="add-note" class="add-btn">Megjegyzés Hozzáadása</button>
                </div>
                <div id="notes-list" class="notes-list">
                    <p class="placeholder">Nincsenek megjegyzések...</p>
                </div>
            </div>

        </div>
    </div>

    <script src="js/mdt.js"></script>
    <script src="js/dispatch.js"></script>
</body>
</html>
